<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التدقيق النقابي - S.N.T.E</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: #f0f4f1; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #1b5e20; }
        .logo img { width: 80px; margin-bottom: 15px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        h2 { margin-top: 0; color: #1b5e20; font-size: 22px; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #1b5e20; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-icon { font-size: 65px; margin-bottom: 10px; }
        .success .status-icon { color: #28a745; }
        .warning .status-icon { color: #f59e0b; }
        .error .status-icon { color: #dc3545; }
        
        .info-box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: right; }
        .info-row { margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .info-label { font-weight: bold; color: #1b5e20; font-size: 13px; }
        .info-value { color: #111; font-size: 16px; font-weight: bold; display: block; margin-top: 4px; }
        
        #result { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <img src="https://a.top4top.io/p_3797pbgxl0.png" alt="شعار">
    </div>
    <h2>التدقيق الأمني للبطاقات</h2>
    
    <div id="loading">
        <div class="loader"></div>
        <p style="font-weight: bold; color: #555;">جاري الاتصال بقاعدة البيانات...</p>
    </div>

    <div id="result">
        </div>
</div>

<script>
    // رابط السيرفر الخاص بك (الإكسل)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlN1RYe6SM7ZvQh1Gq7zn3BJ3hQhnTHbOFVcfHc7PplSmkhH7erSX3NvzFA6sRUFr9/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const cardId = urlParams.get('id');
    
    const loadingDiv = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    if (!cardId) {
        showError("لم يتم العثور على رقم البطاقة في الرابط. يرجى مسح الرمز بشكل صحيح.");
    } else {
        fetch(`${WEB_APP_URL}?id=${cardId}`)
            .then(response => response.json())
            .then(data => {
                loadingDiv.style.display = 'none';
                resultDiv.style.display = 'block';

                if (data.status === "valid") {
                    // إذا كان في حالة الدفع كلمة "انتظار"، نعطيه تحذير أصفر، وإلا نعطيه الضوء الأخضر
                    let isPending = data.paymentStatus.includes("انتظار");

                    if (isPending) {
                        showWarning(data);
                    } else {
                        showSuccess(data);
                    }
                } else {
                    showError("بطاقة غير مسجلة أو مزورة!");
                }
            })
            .catch(error => {
                loadingDiv.style.display = 'none';
                showError("حدث خطأ في الاتصال بقاعدة البيانات. تأكد من الإنترنت.");
            });
    }

    function showSuccess(data) {
        resultDiv.className = "success";
        resultDiv.innerHTML = `
            <div class="status-icon">✅</div>
            <h3 style="color: #28a745; margin: 0 0 5px 0;">بطاقة صالحة</h3>
            <p style="margin: 0 0 15px 0; color: #666; font-size: 14px;">الاشتراك مسدد رسمياً</p>
            ${buildInfo(data)}
        `;
    }

    function showWarning(data) {
        resultDiv.className = "warning";
        resultDiv.innerHTML = `
            <div class="status-icon">⚠️</div>
            <h3 style="color: #f59e0b; margin: 0 0 5px 0;">اشتراك قيد الانتظار</h3>
            <p style="margin: 0 0 15px 0; font-size:13px; color:#666;">البطاقة مسجلة، لكن أمين المال لم يؤكد وصل الدفع بعد.</p>
            ${buildInfo(data)}
        `;
    }

    function showError(msg) {
        resultDiv.className = "error";
        resultDiv.style.display = 'block';
        loadingDiv.style.display = 'none';
        resultDiv.innerHTML = `
            <div class="status-icon">❌</div>
            <h3 style="color: #dc3545; margin: 0 0 10px 0;">تحذير أمني</h3>
            <p style="font-weight: bold;">${msg}</p>
        `;
    }

    function buildInfo(data) {
        return `
            <div class="info-box">
                <div class="info-row"><span class="info-label">رقم الانخراط الذكي:</span><span class="info-value" style="color:#c62828;">${data.id}</span></div>
                <div class="info-row"><span class="info-label">الاسم واللقب:</span><span class="info-value">${data.name}</span></div>
                <div class="info-row"><span class="info-label">الرتبة:</span><span class="info-value">${data.rank}</span></div>
                <div class="info-row"><span class="info-label">مكان العمل:</span><span class="info-value">${data.workplace}</span></div>
                <div class="info-row"><span class="info-label">حالة الدفع:</span><span class="info-value">${data.paymentStatus}</span></div>
            </div>
        `;
    }
</script>
</body>
</html>
